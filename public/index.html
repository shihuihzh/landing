<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%25%22%20y1%3D%220%25%22%20x2%3D%22100%25%22%20y2%3D%22100%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23667eea%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23764ba2%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%226%22%20fill%3D%22url(%23g)%22%2F%3E%3Ctext%20x%3D%2216%22%20y%3D%2223%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-family%3D%22-apple-system%2CBlinkMacSystemFont%2Csans-serif%22%20font-size%3D%2220%22%20font-weight%3D%22700%22%3EL%3C%2Ftext%3E%3C%2Fsvg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .header-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .v6-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .v6-toggle:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .toggle-switch {
      width: 40px;
      height: 22px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 11px;
      position: relative;
      transition: background 0.2s;
    }

    .toggle-switch.active {
      background: #48bb78;
    }

    .toggle-switch::after {
      content: '';
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .toggle-switch.active::after {
      transform: translateX(18px);
    }

    .v6-badge {
      display: inline-block;
      background: #48bb78;
      color: white;
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .link-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .link-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
    }

    .delete-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: #e53e3e;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-card:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: #c53030;
    }

    .link-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      margin-bottom: 1rem;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .link-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .link-icon.placeholder {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .link-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 0.5rem;
    }

    .link-url {
      font-size: 0.875rem;
      color: #718096;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      padding: 4rem 2rem;
    }

    .empty-state h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .empty-state p {
      font-size: 1rem;
      opacity: 0.8;
    }

    .loading {
      text-align: center;
      color: white;
      padding: 2rem;
    }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    /* Modal Box */
    .modal {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      animation: modalIn 0.2s ease-out;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 0.75rem;
    }

    .modal p {
      font-size: 0.95rem;
      color: #718096;
      margin-bottom: 1.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .modal-btn:active {
      transform: scale(0.98);
    }

    .modal-btn-cancel {
      background: #e2e8f0;
      color: #2d3748;
    }

    .modal-btn-cancel:hover {
      background: #cbd5e0;
    }

    .modal-btn-confirm {
      background: #e53e3e;
      color: white;
    }

    .modal-btn-confirm:hover {
      background: #c53030;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Quick Links</h1>
      <p class="subtitle">Your personalized landing page</p>
      <div class="header-controls">
        <div class="v6-toggle" onclick="toggleIPv6()">
          <span>IPv6</span>
          <div class="toggle-switch" id="toggle-switch"></div>
        </div>
      </div>
    </header>

    <main id="links-container">
      <div class="loading">Loading links...</div>
    </main>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Confirm Delete</h3>
      <p id="delete-message">Are you sure you want to delete this link?</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="modal-btn modal-btn-confirm" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let linksData = [];
    let useIPv6 = localStorage.getItem('useIPv6') === 'true';

    function updateToggleState() {
      const toggle = document.getElementById('toggle-switch');
      if (toggle) toggle.classList.toggle('active', useIPv6);
    }

    function getTargetUrl(link) {
      return (useIPv6 && link.v6_url) ? link.v6_url : link.url;
    }

    function renderLinks() {
      const container = document.getElementById('links-container');

      if (linksData.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>No links yet</h2>
            <p>Add links by sending POST requests to /api/urls</p>
          </div>
        `;
        return;
      }

      container.innerHTML = '<div class="links-grid">' +
        linksData.map(link => {
          const targetUrl = getTargetUrl(link);
          const v6Badge = (useIPv6 && link.v6_url) ? '<span class="v6-badge">V6</span>' : '';
          
          return `
            <div class="link-card">
              <button class="delete-btn" onclick="deleteLink('${link.name.replace(/'/g, "\\'")}', event)">Delete</button>
              <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" style="text-decoration: none; color: inherit; display: block;">
                <div class="link-icon ${link.cache_icon || link.icon ? '' : 'placeholder'}">
                  ${(link.cache_icon || link.icon)
                    ? `<img src="${link.cache_icon || link.icon}" alt="${link.name}" onerror="this.parentElement.innerHTML='${link.name.charAt(0).toUpperCase()}'">`
                    : link.name.charAt(0).toUpperCase()
                  }
                </div>
                <div class="link-name">${link.name}${v6Badge}</div>
                <div class="link-url">${targetUrl}</div>
              </a>
            </div>
          `;
        }).join('') +
        '</div>';
    }

    async function loadLinks() {
      try {
        const response = await fetch('/api/urls');
        linksData = await response.json();
        renderLinks();
      } catch (error) {
        document.getElementById('links-container').innerHTML = `
          <div class="empty-state">
            <h2>Error loading links</h2>
            <p>Please try again later</p>
          </div>
        `;
      }
    }

    function toggleIPv6() {
      useIPv6 = !useIPv6;
      localStorage.setItem('useIPv6', useIPv6);
      updateToggleState();
      renderLinks();
    }

    let deleteCallback = null;

    function showDeleteModal(name, callback) {
      const modal = document.getElementById('delete-modal');
      const message = document.getElementById('delete-message');
      message.textContent = `Are you sure you want to delete "${name}"?`;
      deleteCallback = callback;
      modal.classList.add('active');
    }

    function closeDeleteModal() {
      const modal = document.getElementById('delete-modal');
      modal.classList.remove('active');
      deleteCallback = null;
    }

    document.getElementById('confirm-delete-btn').addEventListener('click', () => {
      if (deleteCallback) {
        deleteCallback();
        closeDeleteModal();
      }
    });

    // Close modal when clicking outside
    document.getElementById('delete-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDeleteModal();
    });

    async function deleteLink(name, event) {
      event.preventDefault();
      event.stopPropagation();

      showDeleteModal(name, async () => {
        try {
          const response = await fetch('/api/urls', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
          });

          if (response.ok) {
            loadLinks();
          } else {
            alert('Failed to delete link');
          }
        } catch (error) {
          alert('Error deleting link');
        }
      });
    }

    loadLinks();
    updateToggleState();
  </script>
</body>
</html>
