<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .link-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .link-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
    }

    .link-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      margin-bottom: 1rem;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .link-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .link-icon.placeholder {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .link-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 0.5rem;
    }

    .link-url {
      font-size: 0.875rem;
      color: #718096;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      padding: 4rem 2rem;
    }

    .empty-state h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .empty-state p {
      font-size: 1rem;
      opacity: 0.8;
    }

    .loading {
      text-align: center;
      color: white;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Quick Links</h1>
      <p class="subtitle">Your personalized landing page</p>
    </header>

    <main id="links-container">
      <div class="loading">Loading links...</div>
    </main>
  </div>

  <script>
    async function loadLinks() {
      try {
        const response = await fetch('/api/urls');
        const links = await response.json();

        const container = document.getElementById('links-container');

        if (links.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h2>No links yet</h2>
              <p>Add links by sending POST requests to /api/urls</p>
            </div>
          `;
          return;
        }

        container.innerHTML = '<div class="links-grid">' +
          links.map(link => `
            <a href="/${encodeURIComponent(link.name)}" class="link-card">
              <div class="link-icon ${link.icon ? '' : 'placeholder'}">
                ${link.icon 
                  ? `<img src="${link.icon}" alt="${link.name}" onerror="this.parentElement.innerHTML='${link.name.charAt(0).toUpperCase()}'">`
                  : link.name.charAt(0).toUpperCase()
                }
              </div>
              <div class="link-name">${link.name}</div>
              <div class="link-url">${link.url}</div>
            </a>
          `).join('') +
          '</div>';
      } catch (error) {
        document.getElementById('links-container').innerHTML = `
          <div class="empty-state">
            <h2>Error loading links</h2>
            <p>Please try again later</p>
          </div>
        `;
      }
    }

    loadLinks();
  </script>
</body>
</html>
